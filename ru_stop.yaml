  # --- Short greetings / phrases ---
  - Добрый день
  - Доброе утро
  - Добрый вечер

  # --- Names that might sound close ---
  - Степан
  - Стас
  - Настя

  # --- Voice commands (common in smart home) ---
  - Выключи
  - Включи
  - Переключи
  - Громче
  - Тише
  - Дальше
  - Пауза
  - Играй

  # --- English confusables (synthesised with secondary voices) ---
