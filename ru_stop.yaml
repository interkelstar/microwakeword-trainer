# =============================================================================
# ru_stop.yaml — Wake word config for Russian "Стоп"
#
# A short, sharp command word. Short words are harder to detect reliably
# because there's less acoustic signal to work with. To compensate:
#   - Higher max_neg_weight (more conservative, fewer false positives)
#   - Large negative phrase list covering similar-sounding short words
#   - More training samples for better generalisation
#
# Usage:
#   ./run_training.sh --config ru_stop.yaml
#   ./run_training.sh --config ru_stop.yaml --preview 10
# =============================================================================

model_name: ru_stop

target_phrases:
  - Стоп
  - Стоп!
  - Стоп.

training:
  n_samples: 60000
  n_samples_val: 12000
  steps: 600000
  # Higher penalty for short words — they have more confusables
  max_neg_weight: 5000

voices:
  primary:
    base_url: https://huggingface.co/rhasspy/piper-voices/resolve/main/ru/ru_RU
    models:
      ru_RU-dmitri-medium: dmitri/medium
      ru_RU-denis-medium: denis/medium
      ru_RU-irina-medium: irina/medium
      ru_RU-ruslan-medium: ruslan/medium

  secondary:
    base_url: https://huggingface.co/rhasspy/piper-voices/resolve/main
    models:
      en_US-amy-medium: en/en_US/amy/medium
      en_US-john-medium: en/en_US/john/medium
      en_GB-alan-medium: en/en_GB/alan/medium

negative_phrases:
  # --- Partial matches / substrings ---
  - Сто
  - Топ
  - Стой
  - Стоя

  # --- "Ст-" onset words ---
  - Стол
  - Стон
  - Стук
  - Стул
  - Стая
  - Стих
  - Стиль
  - Стена
  - Степь
  - Старт
  - Ствол
  - Стакан
  - Статья
  - Страна
  - Строй
  - Стройка
  - Студент
  - Ступень

  # --- "-оп" / "-оп-" rhymes ---
  - Хлоп
  - Шоп
  - Поп
  - Коп
  - Лоп
  - Укроп
  - Потоп
  - Галоп
  - Циклоп
  - Сироп

  # --- Similar short commands ---
  - Старт
  - Пуск
  - Стой
  - Хоп
  - Гоп
  - Шаг
  - Пас
  - Бам
  - Бум
  - Тут
  - Так

  # --- Common household speech (false-activation sources) ---
  - Привет
  - Окей
  - Хватит
  - Начни
  - Открой
  - Закрой
  - Вперёд
  - Назад
  - Помоги
  - Хорошо
  - Понял
  - Давай
  - Ладно
  - Нет
  - Да

  # --- Russian assistant / device names ---
